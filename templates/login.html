<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSV Enricher - Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: #f0f2f5; display: flex; align-items: center; justify-content: center;
           min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; padding: 40px; width: 400px;
            box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    h1 { font-size: 22px; margin-bottom: 4px; color: #1a1a2e; }
    .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    input[type=text], input[type=password] { width: 100%; padding: 10px 12px; border: 1px solid #ddd;
           border-radius: 6px; font-size: 14px; margin-bottom: 16px; }
    .btn { display: block; width: 100%; padding: 11px; border: none; border-radius: 6px;
           font-size: 15px; cursor: pointer; text-align: center; text-decoration: none; }
    .btn-primary { background: #1a1a2e; color: #fff; }
    .btn-primary:hover { background: #16213e; }
    .btn-microsoft { background: #fff; color: #333; border: 1px solid #ddd;
                     display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-microsoft:hover { background: #f5f5f5; }
    .btn-microsoft svg { width: 20px; height: 20px; }
    .divider { display: flex; align-items: center; margin: 20px 0; color: #999; font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; border-top: 1px solid #eee; }
    .divider::before { margin-right: 12px; }
    .divider::after { margin-left: 12px; }
    .flash { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; }
    .flash.success { background: #d4edda; color: #155724; }
    .flash.error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="card">
    <h1>CSV Enricher</h1>
    <p class="subtitle">Enterprise Lead Enrichment Platform</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <a href="{{ url_for('login_microsoft') }}" class="btn btn-microsoft">
      <svg viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Sign in with Microsoft
    </a>

    <div class="divider">or sign in with password</div>

    <form method="POST">
      <label for="username">Username</label>
      <input type="text" name="username" id="username" autofocus>
      <label for="password">Password</label>
      <input type="password" name="password" id="password">
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
  </div>
</body>
</html>
