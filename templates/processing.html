<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CSV Enricher - Processing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: #f0f2f5; min-height: 100vh; }
    .nav { background: #1a1a2e; color: #fff; padding: 14px 24px; display: flex;
           align-items: center; justify-content: space-between; font-size: 14px; }
    .nav a { color: #a0aec0; text-decoration: none; }
    .nav a:hover { color: #fff; }
    .container { max-width: 640px; margin: 60px auto; padding: 0 20px; }
    .card { background: #fff; border-radius: 12px; padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,.08); text-align: center; }
    h1 { font-size: 22px; margin-bottom: 16px; }
    .spinner { width: 48px; height: 48px; border: 4px solid #e0e0e0; border-top-color: #1a1a2e;
               border-radius: 50%; animation: spin 0.8s linear infinite; margin: 24px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .phase { margin: 16px 0; font-size: 14px; color: #555; }
    .phase .label { font-weight: 600; color: #333; }
    .phase .status { color: #1a1a2e; }
    .phase.done .label { color: #28a745; }
    .phase.done .label::before { content: '\2713 '; }
    .phase.active .label { color: #1a1a2e; }
    .phase.active .status::after { content: '...'; animation: dots 1.5s infinite; }
    @keyframes dots { 0%,20% { content: '.'; } 40% { content: '..'; } 60%,100% { content: '...'; } }
    .bar-bg { background: #e9ecef; border-radius: 20px; height: 8px; margin: 20px 0; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, #1a1a2e, #4a4a7a);
                border-radius: 20px; transition: width .5s; width: 0%; }
    .pct { font-size: 13px; color: #666; }
    .company-name { font-size: 13px; color: #888; margin-top: 4px; }
    .download-btn { display: inline-block; padding: 14px 36px; background: #28a745; color: #fff;
                    text-decoration: none; border-radius: 6px; font-size: 16px; margin-top: 20px; }
    .download-btn:hover { background: #218838; }
    .error-box { background: #f8d7da; color: #721c24; padding: 16px; border-radius: 6px;
                 margin-top: 16px; font-size: 14px; text-align: left; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="nav">
    <span><strong>CSV Enricher</strong></span>
  </div>
  <div class="container">
    <div class="card" id="progress-card">
      <h1>Processing Your File</h1>
      <div class="spinner" id="spinner"></div>

      <div class="bar-bg"><div class="bar-fill" id="bar-fill"></div></div>
      <div class="pct" id="pct">0%</div>
      <div class="company-name" id="company-name"></div>

      <div class="phase" id="phase-software">
        <span class="label">Software Research:</span>
        <span class="status" id="sw-status">Queued</span>
      </div>
      <div class="phase" id="phase-intent">
        <span class="label">Intent Research:</span>
        <span class="status" id="in-status">Queued</span>
      </div>
      <div class="phase" id="phase-tier">
        <span class="label">Tier Classification:</span>
        <span class="status" id="tier-status">Queued</span>
      </div>
      <div class="phase" id="phase-validation">
        <span class="label">Row Validation:</span>
        <span class="status" id="val-status">Queued</span>
      </div>

      <div id="done-box" class="hidden">
        <div style="font-size:48px;margin:12px 0;">&#9989;</div>
        <h2>Done!</h2>
        <a class="download-btn" id="download-link" href="#">Download Enriched CSV</a>
      </div>

      <div id="error-box" class="error-box hidden"></div>
    </div>
  </div>

  <script>
    const taskId = '{{ task_id }}';
    const poll = () => {
      fetch('/api/status/' + taskId)
        .then(r => r.json())
        .then(s => {
          document.getElementById('bar-fill').style.width = s.progress_pct + '%';
          document.getElementById('pct').textContent = s.progress_pct + '%';
          document.getElementById('company-name').textContent =
            s.company_name ? 'Currently: ' + s.company_name : '';

          const setPhase = (id, st, active) => {
            const el = document.getElementById(id);
            el.classList.toggle('active', active);
            el.classList.toggle('done', st === 'done' || st === 'complete');
            document.getElementById(id + '-status').textContent =
              st === 'done' || st === 'complete' ? 'Complete' :
              st === 'processing' ? 'Processing' : st || 'Queued';
          };

          if (s.state === 'error') {
            document.getElementById('spinner').classList.add('hidden');
            const eb = document.getElementById('error-box');
            eb.classList.remove('hidden');
            eb.textContent = 'Error: ' + (s.error || 'Unknown error');
            return;
          }

          if (s.state === 'complete') {
            document.getElementById('spinner').classList.add('hidden');
            document.getElementById('done-box').classList.remove('hidden');
            document.getElementById('download-link').href = '/download/' + taskId;
            setPhase('phase-software', 'done');
            setPhase('phase-intent', 'done');
            setPhase('phase-tier', 'done');
            setPhase('phase-validation', 'done');
            return;
          }

          setPhase('phase-software', s.software_phase || 'pending',
            typeof s.software_phase === 'string' && s.software_phase.startsWith('processing'));
          setPhase('phase-intent', s.intent_phase || 'pending',
            typeof s.intent_phase === 'string' && s.intent_phase.startsWith('processing'));
          setPhase('phase-tier', s.tier_phase || 'pending',
            s.tier_phase === 'processing');
          setPhase('phase-validation', s.validation_phase,
            s.validation_phase === 'processing');

          setTimeout(poll, 1000);
        })
        .catch(() => setTimeout(poll, 2000));
    };
    poll();
  </script>
</body>
</html>
